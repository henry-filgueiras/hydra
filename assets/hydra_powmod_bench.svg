<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" width="720" height="340" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="hydraBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#79c0ff"/>
    </linearGradient>
    <linearGradient id="boostBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6e4080"/>
      <stop offset="100%" stop-color="#9064a8"/>
    </linearGradient>
    <linearGradient id="gmpBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#238636"/>
      <stop offset="100%" stop-color="#3fb950"/>
    </linearGradient>
    <linearGradient id="osslBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b08800"/>
      <stop offset="100%" stop-color="#d4a017"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="720" height="340" rx="8" fill="url(#bg)"/>

  <!-- Title -->
  <text x="360" y="28" text-anchor="middle" fill="#c9d1d9" font-size="14" font-weight="600">pow_mod(base, exp, mod) — median latency (lower is better)</text>

  <!-- Legend -->
  <rect x="160" y="40" width="10" height="10" rx="2" fill="url(#hydraBar)"/>
  <text x="174" y="49" fill="#c9d1d9" font-size="10">Hydra</text>
  <rect x="260" y="40" width="10" height="10" rx="2" fill="url(#boostBar)"/>
  <text x="274" y="49" fill="#c9d1d9" font-size="10">Boost cpp_int</text>
  <rect x="390" y="40" width="10" height="10" rx="2" fill="url(#gmpBar)"/>
  <text x="404" y="49" fill="#c9d1d9" font-size="10">GMP</text>
  <rect x="470" y="40" width="10" height="10" rx="2" fill="url(#osslBar)"/>
  <text x="484" y="49" fill="#c9d1d9" font-size="10">OpenSSL</text>

  <!-- === 256-bit group === -->
  <!-- Scale: max = 47.9 µs → bar width = 440px at max -->
  <text x="70" y="84" text-anchor="end" fill="#8b949e" font-size="12" font-weight="500">256-bit</text>

  <!-- Hydra 19.9 µs -->
  <rect x="80" y="72" width="183" height="14" rx="3" fill="url(#hydraBar)" opacity="0.9"/>
  <text x="268" y="83" fill="#79c0ff" font-size="10" font-weight="600">19.9 µs</text>

  <!-- Boost 47.9 µs -->
  <rect x="80" y="88" width="440" height="14" rx="3" fill="url(#boostBar)" opacity="0.7"/>
  <text x="525" y="99" fill="#9064a8" font-size="10">47.9 µs</text>

  <!-- GMP 7.2 µs -->
  <rect x="80" y="104" width="66" height="14" rx="3" fill="url(#gmpBar)" opacity="0.7"/>
  <text x="151" y="115" fill="#3fb950" font-size="10">7.2 µs</text>

  <!-- OpenSSL 5.3 µs -->
  <rect x="80" y="120" width="49" height="14" rx="3" fill="url(#osslBar)" opacity="0.7"/>
  <text x="134" y="131" fill="#d4a017" font-size="10">5.3 µs</text>

  <!-- === 1024-bit group === -->
  <!-- Scale: max = 1320 µs → bar width = 440px at max -->
  <text x="70" y="170" text-anchor="end" fill="#8b949e" font-size="12" font-weight="500">1024-bit</text>

  <!-- Hydra 607 µs -->
  <rect x="80" y="158" width="202" height="14" rx="3" fill="url(#hydraBar)" opacity="0.9"/>
  <text x="287" y="169" fill="#79c0ff" font-size="10" font-weight="600">607 µs</text>

  <!-- Boost 1320 µs -->
  <rect x="80" y="174" width="440" height="14" rx="3" fill="url(#boostBar)" opacity="0.7"/>
  <text x="525" y="185" fill="#9064a8" font-size="10">1.32 ms</text>

  <!-- GMP 156 µs -->
  <rect x="80" y="190" width="52" height="14" rx="3" fill="url(#gmpBar)" opacity="0.7"/>
  <text x="137" y="201" fill="#3fb950" font-size="10">156 µs</text>

  <!-- OpenSSL 111 µs -->
  <rect x="80" y="206" width="37" height="14" rx="3" fill="url(#osslBar)" opacity="0.7"/>
  <text x="122" y="217" fill="#d4a017" font-size="10">111 µs</text>

  <!-- === 2048-bit group === -->
  <!-- Scale: max = 8600 µs → bar width = 440px at max -->
  <text x="70" y="256" text-anchor="end" fill="#8b949e" font-size="12" font-weight="500">2048-bit</text>

  <!-- Hydra 3990 µs -->
  <rect x="80" y="244" width="204" height="14" rx="3" fill="url(#hydraBar)" opacity="0.9"/>
  <text x="289" y="255" fill="#79c0ff" font-size="10" font-weight="600">3.99 ms</text>

  <!-- Boost 8600 µs -->
  <rect x="80" y="260" width="440" height="14" rx="3" fill="url(#boostBar)" opacity="0.7"/>
  <text x="525" y="271" fill="#9064a8" font-size="10">8.60 ms</text>

  <!-- GMP 1130 µs -->
  <rect x="80" y="276" width="58" height="14" rx="3" fill="url(#gmpBar)" opacity="0.7"/>
  <text x="143" y="287" fill="#3fb950" font-size="10">1.13 ms</text>

  <!-- OpenSSL 798 µs -->
  <rect x="80" y="292" width="41" height="14" rx="3" fill="url(#osslBar)" opacity="0.7"/>
  <text x="126" y="303" fill="#d4a017" font-size="10">798 µs</text>

  <!-- Footer -->
  <text x="360" y="328" text-anchor="middle" fill="#484f58" font-size="9">Apple Silicon · clang -O3 · single core · portable C++20 (zero assembly)</text>
</svg>
